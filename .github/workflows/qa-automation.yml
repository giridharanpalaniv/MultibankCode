name: MultiBank QA Automation

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run daily at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      browser:
        description: 'Browser to use'
        required: false
        default: 'chrome'
        type: choice
        options: [ chrome, firefox, edge ]

jobs:
  unit-tests:
    name: Task 2 — Unit Tests (CharacterFrequency)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: Build project
        run: mvn clean compile -q

      - name: Compile CharacterFrequency utility
        run: |
          mkdir -p target/test-classes
          javac -d target/test-classes -cp target/test-classes src/test/java/com/multibank/utils/CharacterFrequency.java

      - name: Compile SimpleCharacterFrequencyTest
        run: |
          javac -d target/test-classes -cp target/test-classes src/test/java/com/multibank/tests/SimpleCharacterFrequencyTest.java

      - name: Run CharacterFrequency standalone tests
        run: |
          java -cp target/test-classes com.multibank.tests.SimpleCharacterFrequencyTest
        continue-on-error: true

      - name: Run CharacterFrequency unit tests with TestNG
        run: mvn test -DsuiteXmlFile=testng-unit.xml -q
        continue-on-error: true

  ui-tests:
    name: Task 1 — UI Automation (${{ matrix.browser }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        browser: [ chrome, firefox ]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: Set up Chrome
        if: matrix.browser == 'chrome'
        uses: browser-actions/setup-chrome@latest

      - name: Set up Firefox
        if: matrix.browser == 'firefox'
        uses: browser-actions/setup-firefox@latest

      - name: Run UI tests — ${{ matrix.browser }} (headless)
        run: |
          mvn test \
            -Dbrowser=${{ matrix.browser }} \
            -Dheadless=true \
            -DsuiteXmlFile=testng.xml
        continue-on-error: true

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ matrix.browser }}
          path: reports/
          retention-days: 14

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ matrix.browser }}
          path: reports/screenshots/
          retention-days: 7
