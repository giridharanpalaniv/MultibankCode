# ============================================================
# MultiBank QA Framework Configuration
# Override any value via: mvn test -Dbrowser=firefox -Dheadless=true
# ============================================================

# Browser: chrome | firefox | edge
browser=chrome

# Target application
base.url=https://trade.multibank.io/

# Wait timeouts (seconds)
implicit.wait.seconds=0
explicit.wait.seconds=15
page.load.timeout=30

# Headless mode (true for CI)
headless=false

# Screenshots on failure
screenshot.on.fail=true

# Report output directory
report.dir=reports

# Test data directory (relative to src/test/resources)
testdata.dir=testdata

# Remote / Grid execution
remote.execution=false
remote.url=http://localhost:4444/wd/hub
